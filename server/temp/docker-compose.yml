services:
  qishui-server:
    image: qiuyu6543/qishui-music-analysis-server:latest
    container_name: qishui-music-analysis-server
    ports:
      - "${PORT:-6623}:${PORT:-6623}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-6623}
    pull_policy: always
    restart: unless-stopped
    networks:
      - qishui-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||6623)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  qishui-network:
    external: true