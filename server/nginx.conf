events {}

http {
  include mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/wasm
    image/svg+xml;

  server {
    listen 80;
    server_name _;

    location /c/ {
      proxy_pass http://card-secret-frontend-mysql-version/;
      
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
    }

    # 后端 API
    location /api/ {
      proxy_pass http://card-secret-backend-mysql-version:8887;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 跨域代理转发服务 -> cors-proxy:8080
    location /cors/ {
      proxy_pass http://cors-proxy:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_connect_timeout 30s;
      proxy_send_timeout 30s;
    }

    # 汽水音乐解析服务 - 静态文件
    location /qishui/ {
      alias /app/qishuiMusicAnalysis/;
      index index.html;
      try_files $uri $uri/ /qishui/index.html;
    }
    location = /qishui {
      return 301 /qishui/;
    }

    location /qishuiParse/ {
      rewrite ^/qishuiParse/(.*)$ /$1 break;
      proxy_pass http://qishui-music-analysis-server:6623;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /qishuiParse {
      return 301 /qishuiParse/;
    }
  }
}
